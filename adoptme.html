<!doctype html>

<html>
  <head>
    <title>Adopt Me</title>
    <link rel="stylesheet" href="adoptme.css">
  </head>
  <body>
    <form>
      <p>ข้อมูลส่วนตัวผู้สนใจรับอุปการะสุนัข</p>
      <label for="firstName">First Name:</label>
      <input type="text" id="firstName" name="firstName" required />
      <br>

      <label for="lastName">Last Name:</label>
      <input type="text" id="lastName" name="lastName" required />
      <br>

      <label for="tel">Phone Number:</label>
      <input type="tel" id="tel" name="tel" />
      <br>

      <label for="email">Email:</label>
      <input type="email" id="email" name="email" />

      <p>สิ่งแวดล้อมในการเลี้ยงดู</p>

      <label for="address">Address:</label>
      <input type="text" id="address" name="address" />
      <br>

      <label for="environment">ประเภทที่อยู่อาศัย:</label>
      <select id="environment" name="environment">
        <option value="garden_house">บ้านสวน</option>
        <option value="house">บ้านเดี่ยว</option>
        <option value="townhome">บ้านทาวน์โฮม</option>
        <option value="condo">คอนโดมิเนียม / หอพัก</option>
      </select>
      <br>

      <p>สถานที่เลี้ยงสุนัข</p>
      <input type="radio" id="inside" name="place" value="inside" />
      <label for="inside">เลี้ยงภายในบ้าน</label>

      <input type="radio" id="outside" name="place" value="outside" />
      <label for="outside">เลี้ยงภายนอกบ้าน</label>
      <br>

      <label for="petcount">จำนวนสัตว์เลี้ยงที่มีอยู่ปัจจุบัน:</label>
      <input type="number" id="petcount" name="petcount" min="0" />
      <br>

      <input type="checkbox" id="agree" />
      <label for="agree">
        การส่งแบบฟอร์มนี้เป็นการแจ้งความสนใจ โดยไม่รับรองการได้รับอุปการะสุนัข
      </label>

      <br>
      <input type="submit" value="ส่งแบบฟอร์ม" />
    </form>

    <p style="text-align: center">6833083521 ณัฐณิชา อินทอง</p>
  </body>
</html>
